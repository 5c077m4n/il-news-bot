version: "3"

dotenv:
  - .env

tasks:
  run:
    cmd: uv run src/main.py
  watch:
    cmd: PYTHONPATH=src uv run uvicorn --reload src.main:main
  compose:
    cmd: docker compose --profile "{{.PROFILE}}" up -d --build --remove-orphans
  decompose:
    cmd: docker compose down --rmi all --volumes --remove-orphans
  recompose:
    cmds:
      - task: decompose
      - task: compose
  logs:
    cmd: docker logs --follow il-news-bot-{{default "il-news-bot" .SERVICE}}-1
  exec:
    cmd: docker exec -it il-news-bot-{{default "il-news-bot" .SERVICE}}-1 bash

  ssh:
    vars:
      IP:
        sh: doctl compute droplet list --format PublicIPv4 | tail -n 1
      SSH_KEY: ~/.ssh/keys/do_ed25519
    cmd: ssh -i {{.SSH_KEY}} -i {{.SSH_KEY}}.pub "root@{{.IP}}" "{{.COMMAND}}"
  ssh:update:
    cmds:
      - task: ssh
        vars:
          COMMAND: cd /app && git pull --rebase && docker compose up -d --build --remove-orphans
  ssh:stop:
    cmds:
      - task: ssh
        vars:
          COMMAND: cd /app && docker compose down
  ssh:logs:
    cmds:
      - task: ssh
        vars:
          COMMAND: docker logs --follow app-il-news-bot-1
  deploy:
    env:
      TF_VAR_DO_TOKEN: "{{.DO_TOKEN}}"
      TF_VAR_OPENROUTER_API_KEY: "{{.OPENROUTER_API_KEY}}"
      TF_VAR_TELEGRAM_BOT_TOKEN: "{{.TELEGRAM_BOT_TOKEN}}"
      TF_VAR_TELEGRAM_API_ID: "{{.TELEGRAM_API_ID}}"
      TF_VAR_TELEGRAM_API_HASH: "{{.TELEGRAM_API_HASH}}"
      TF_VAR_MONGODB_USERNAME: "{{.MONGODB_USERNAME}}"
      TF_VAR_MONGODB_PASSWORD: "{{.MONGODB_PASSWORD}}"
      TF_VAR_MONGODB_DATABASE: "{{.MONGODB_DATABASE}}"
    cmd: tofu apply
