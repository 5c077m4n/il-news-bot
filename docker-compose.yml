services:
  il-news-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MONGODB_HOST: mongodb
    volumes:
      - huggingface:/home/nonroot/.cache/huggingface/
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    ports:
      - 27017:27017
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGODB_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGODB_PASSWORD}"
      MONGO_INITDB_DATABASE: "${MONGODB_DATABASE}"
    volumes:
      - mongodb:/data/db
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  huggingface: {}
  mongodb: {}
