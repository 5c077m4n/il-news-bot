[providers]
offered = ["openrouter"]

[server]
bind = "127.0.0.1"
port = 36973
http_request_logs = false
ws_request_logs = false
log_buffer_size = 1000
db_pool_max_connections = 5

[ngrok]
enabled = false

[providers.openrouter]
enabled = true
models = ["google/gemma-4-31b-it"]

[mcp]
request_timeout_secs = 30

[mcp.servers.news]
transport = "sse"
url = "http://il-news-mcp:8888"
command = ""
args = []
enabled = true

[mcp.servers.news.env]

[mcp.servers.news.headers]

[channels]
offered = ["telegram"]

[chat]
message_queue_mode = "followup"
priority_models = []

[tools.exec.sandbox]
mode = "all"
scope = "session"
workspace_mount = "ro"
home_persistence = "session"
backend = "auto"
no_network = true
packages = ["curl", "git", "jq", "ls", "ripgrep", "fd"]
network = ""
trusted_domains = []

[tools.exec.sandbox.resource_limits]

[tools.policy]
allow = []
deny = []

[tools.web.search]
enabled = true
provider = "brave"
max_results = 5
timeout_seconds = 30
cache_ttl_minutes = 15
duckduckgo_fallback = false

[tools.web.firecrawl]
enabled = false
base_url = "https://api.firecrawl.dev"
only_main_content = true
timeout_seconds = 30
cache_ttl_minutes = 15
web_fetch_fallback = true

[tools.web.search.perplexity]

[tools.web.fetch]
enabled = true
max_chars = 50000
timeout_seconds = 30
cache_ttl_minutes = 15
max_redirects = 3
readability = true
ssrf_allowlist = []

[tools.maps]
provider = "google_maps"

[tools.browser]
enabled = true
headless = true
viewport_width = 2560
viewport_height = 1440
device_scale_factor = 2.0
max_instances = 0
memory_limit_percent = 90
idle_timeout_secs = 300
navigation_timeout_ms = 30000
chrome_args = []
sandbox_image = "browserless/chrome"
allowed_domains = []
low_memory_threshold_mb = 2048
persist_profile = true
container_host = "127.0.0.1"

[agents.presets]

[agents.presets.orchestrator]
identity.name = "orchestrator"
model = "google/gemma-4-31b-it"
tools.allow = [
  "spawn_agent",
  "sessions_list",
  "sessions_history",
  "sessions_search",
  "sessions_send",
  "task_list",
]
sessions.can_send = true
delegate_only = true

[agents.presets.left-wing]
identity.name = "Lefty"
identity.theme = "focused, concise and efficient"
system_prompt_suffix = "Act as a progressive news anchor who is principled, calm, and meticulous. Your perspective leans left—prioritizing social justice, environmental protection, and economic equality—but your primary allegiance is to the truth. Every headline you deliver must be accompanied by a specific, credible source. Avoid hyperbole; let the data and the ethics of the story drive the narrative. Your tone is professional, empathetic, and intellectually rigorous. **Do not** send a headline without at least one link to the original source (the more souces the better)"
model = "google/gemma-4-31b-it"
tools.allow = ["read_file", "mcp__news__news", "web_fetch", "web_search"]
tools.deny = ["exec", "write_file"]
delegate_only = false

[agents.presets.right-wing]
identity.name = "Righty"
identity.theme = "focused, concise and efficient"
system_prompt_suffix = "Act as a principled, center-right news anchor. Your tone is professional, traditional, and analytical. You prioritize individual liberty, fiscal responsibility, and local governance. Crucially, every headline must be followed by a specific, credible source or data point. Avoid hyperbole; focus on interpreting current events through a conservative lens while maintaining strict journalistic integrity and factual accuracy. **Do not** send a headline without at least one link to the original source (the more souces the better)"
model = "google/gemma-4-31b-it"
tools.allow = ["read_file", "mcp__news__news", "web_fetch", "web_search"]
tools.deny = ["exec", "write_file"]
delegate_only = false

[skills]
enabled = false
search_paths = []
auto_load = []
enable_agent_sidecar_files = false

[channels.whatsapp]

[channels.msteams]

[channels.discord]

[channels.slack]

[tools]
agent_timeout_secs = 600
agent_max_iterations = 25
max_tool_result_bytes = 50000
registry_mode = "full"

[tools.exec]
default_timeout_secs = 30
max_output_bytes = 204800
approval_mode = "on-miss"
security_level = "allowlist"
allowlist = []
host = "local"

[channels.telegram."${TELEGRAM_BOT_ID}"]
dm_policy = "open"
token = "${TELEGRAM_API_KEY}"
model = "google/gemma-4-31b-it"
model_provider = "openrouter"

[tls]
enabled = true
auto_generate = true

[auth]
disabled = false

[graphql]
enabled = true

[metrics]
enabled = true
prometheus_endpoint = true
history_points = 360

[metrics.labels]

[identity]

[user]

[memory]
disable_rag = false
llm_reranking = false
session_export = false

[memory.qmd.collections]

[tailscale]
mode = "off"
reset_on_exit = true

[failover]
enabled = true
fallback_models = []

[heartbeat]
enabled = true
every = "30m"
ack_max_chars = 300
deliver = false
sandbox_enabled = true

[heartbeat.active_hours]
start = "08:00"
end = "24:00"
timezone = "local"

[voice.tts]
enabled = true
provider = ""
providers = []

[voice.tts.elevenlabs]

[voice.tts.openai]

[voice.tts.google]

[voice.tts.piper]

[voice.tts.coqui]
endpoint = "http://localhost:5002"

[voice.stt]
enabled = true
providers = []

[voice.stt.whisper]

[voice.stt.groq]

[voice.stt.deepgram]
smart_format = false

[voice.stt.google]

[voice.stt.mistral]

[voice.stt.elevenlabs]

[voice.stt.voxtral_local]
endpoint = "http://localhost:8000"

[voice.stt.whisper_cli]

[voice.stt.sherpa_onnx]

[cron]
rate_limit_max = 10
rate_limit_window_secs = 60
session_retention_days = 7
auto_prune_cron_containers = true

[caldav]
enabled = false

[caldav.accounts]

[webhooks.rate_limit]
enabled = true
cleanup_interval_secs = 300

[env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
